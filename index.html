<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Catcher</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <img src="assets/img/fondo_arrecife.png" class="fondo-pantalla">
    <canvas id="burbujas"></canvas>

    <div class="game-container">
        <header class="ui-header">
            <h1 class="logo-mini"><span>🐟</span> FISH CATCHER</h1>
            <div class="stats">
                <span>Puntos: <strong id="puntos">0</strong></span>
                <span>Vidas: <strong id="vidas">3</strong></span>
                <span>Tiempo: <strong id="tiempo">60</strong></span>
                <span>Nivel: <strong id="nivel">1</strong></span>
            </div>
        </header>

        <div class="game-area">
            <canvas id="gameCanvas"></canvas>

            <div id="start-screen" class="overlay">
                <h2 class="titulo-grande">Fish Catcher</h2>
                <p>Relaxing Ocean Adventure</p>
                <button id="btnJugar" class="btn-principal">¡JUGAR!</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
